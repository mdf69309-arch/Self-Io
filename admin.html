<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnZone — অ্যাডমিন</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a; --card: #111827; --accent: #f59e0b;
      --green: #10b981; --red: #ef4444; --blue: #3b82f6;
      --text: #f1f5f9; --muted: #64748b; --border: rgba(245,158,11,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Bengali','Sora',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }
    .header { background: #111827; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .header-title { font-family: 'Sora',sans-serif; font-size: 18px; font-weight: 800; color: var(--accent); }
    .logout-btn { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .container { padding: 20px 16px; }

    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 14px; }
    .stat-card .icon { font-size: 24px; margin-bottom: 8px; }
    .stat-card .val { font-family: 'Sora',sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Section */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* Settings Form */
    .setting-row { margin-bottom: 16px; }
    .setting-row label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .setting-row input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 15px;
      font-family: inherit; outline: none;
    }
    .setting-row input:focus { border-color: var(--accent); }
    .btn-save { width: 100%; padding: 13px; background: linear-gradient(135deg,var(--accent),#f97316); border: none; border-radius: 12px; color: #000; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }

    /* Withdraw Requests */
    .withdraw-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .withdraw-item .wr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .withdraw-item .wr-name { font-size: 15px; font-weight: 700; }
    .withdraw-item .wr-status { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .wr-status.pending { background: rgba(245,158,11,0.15); color: var(--accent); }
    .wr-status.approved { background: rgba(16,185,129,0.15); color: var(--green); }
    .wr-status.rejected { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .withdraw-item .wr-info { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .wr-actions { display: flex; gap: 8px; }
    .btn-approve { flex: 1; padding: 9px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--green); border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-reject { flex: 1; padding: 9px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* Users */
    .user-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .user-info .u-name { font-size: 14px; font-weight: 700; }
    .user-info .u-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .user-points { font-family: 'Sora',sans-serif; font-size: 18px; font-weight: 800; color: var(--accent); }

    .empty-state { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 2000; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 9px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); transition: all 0.3s; }
    .tab.active { background: linear-gradient(135deg,var(--accent),#f97316); color: #000; }

    .loading { text-align: center; padding: 20px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">⚙️ অ্যাডমিন প্যানেল</span>
    <button class="logout-btn" onclick="doLogout()">লগআউট</button>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="val" id="totalUsers">-</div>
        <div class="lbl">মোট ইউজার</div>
      </div>
      <div class="stat-card">
        <div class="icon">💸</div>
        <div class="val" id="pendingCount">-</div>
        <div class="lbl">উইথড্র পেন্ডিং</div>
      </div>
      <div class="stat-card">
        <div class="icon">⭐</div>
        <div class="val" id="totalPoints">-</div>
        <div class="lbl">মোট পয়েন্ট</div>
      </div>
      <div class="stat-card">
        <div class="icon">✅</div>
        <div class="val" id="approvedCount">-</div>
        <div class="lbl">অনুমোদিত</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('settings')">সেটিংস</div>
      <div class="tab" onclick="switchTab('withdraw')">উইথড্র</div>
      <div class="tab" onclick="switchTab('users')">ইউজার</div>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab">
      <div class="section">
        <div class="section-title">💡 বিজ্ঞাপন পয়েন্ট সেটিংস</div>
        <div class="setting-row">
          <label>স্পিন দেখলে পয়েন্ট</label>
          <input type="number" id="spinPoints" placeholder="যেমন: 10">
        </div>
        <div class="setting-row">
          <label>কুইজ প্রতি পয়েন্ট</label>
          <input type="number" id="quizPoints" placeholder="যেমন: 15">
        </div>
        <div class="setting-row">
          <label>স্ক্র্যাচ পয়েন্ট</label>
          <input type="number" id="scratchPoints" placeholder="যেমন: 20">
        </div>
        <button class="btn-save" onclick="saveAdSettings()">💾 পয়েন্ট সেটিংস সেভ করুন</button>
      </div>

      <div class="section">
        <div class="section-title">💱 পয়েন্ট → টাকা রেট</div>
        <div class="setting-row">
          <label>১ পয়েন্ট = কত টাকা?</label>
          <input type="number" id="pointsToTaka" placeholder="যেমন: 0.01" step="0.001">
        </div>
        <div class="setting-row">
          <label>সর্বনিম্ন উইথড্র (পয়েন্ট)</label>
          <input type="number" id="minWithdraw" placeholder="যেমন: 100">
        </div>
        <button class="btn-save" onclick="saveRateSettings()">💾 রেট সেটিংস সেভ করুন</button>
      </div>

      <div class="section">
        <div class="section-title">🔑 অ্যাডমিন বানান</div>
        <div class="setting-row">
          <label>ইউজার UID বা Email</label>
          <input type="text" id="adminEmail" placeholder="ইউজার UID দিন">
        </div>
        <button class="btn-save" onclick="makeAdmin()">👑 অ্যাডমিন করুন</button>
      </div>
    </div>

    <!-- Withdraw Tab -->
    <div id="withdrawTab" style="display:none">
      <div id="withdrawList"><div class="loading">লোড হচ্ছে...</div></div>
    </div>

    <!-- Users Tab -->
    <div id="usersTab" style="display:none">
      <div id="usersList"><div class="loading">লোড হচ্ছে...</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc, setDoc, updateDoc, collection, getDocs, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists() || !snap.data().isAdmin) {
        window.location.href = 'home.html'; return;
      }
      currentUser = user;
      loadSettings();
      loadStats();
    });

    async function loadSettings() {
      const snap = await getDoc(doc(db, 'settings', 'adConfig'));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('spinPoints').value = d.spinPoints || 10;
        document.getElementById('quizPoints').value = d.quizPoints || 15;
        document.getElementById('scratchPoints').value = d.scratchPoints || 20;
        document.getElementById('pointsToTaka').value = d.pointsToTaka || 0.01;
        document.getElementById('minWithdraw').value = d.minWithdraw || 100;
      }
    }

    async function loadStats() {
      const usersSnap = await getDocs(collection(db, 'users'));
      let totalPts = 0;
      usersSnap.forEach(d => { totalPts += d.data().points || 0; });
      document.getElementById('totalUsers').textContent = usersSnap.size;
      document.getElementById('totalPoints').textContent = totalPts;

      const wrSnap = await getDocs(collection(db, 'withdrawRequests'));
      let pending = 0, approved = 0;
      wrSnap.forEach(d => {
        if (d.data().status === 'pending') pending++;
        if (d.data().status === 'approved') approved++;
      });
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('approvedCount').textContent = approved;
    }

    window.switchTab = (tab) => {
      ['settings','withdraw','users'].forEach(t => {
        document.getElementById(t + 'Tab').style.display = t === tab ? 'block' : 'none';
      });
      document.querySelectorAll('.tab').forEach((el, i) => {
        const tabs = ['settings','withdraw','users'];
        el.classList.toggle('active', tabs[i] === tab);
      });
      if (tab === 'withdraw') loadWithdrawRequests();
      if (tab === 'users') loadUsers();
    };

    async function loadWithdrawRequests() {
      const container = document.getElementById('withdrawList');
      container.innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
      const snap = await getDocs(query(collection(db, 'withdrawRequests'), orderBy('createdAt', 'desc')));
      if (snap.empty) { container.innerHTML = '<div class="empty-state">কোনো রিকোয়েস্ট নেই</div>'; return; }
      container.innerHTML = '';
      snap.forEach(d => {
        const data = d.data();
        const el = document.createElement('div');
        el.className = 'withdraw-item';
        el.innerHTML = `
          <div class="wr-header">
            <span class="wr-name">${data.userName || 'অজানা'}</span>
            <span class="wr-status ${data.status}">${data.status === 'pending' ? 'পেন্ডিং' : data.status === 'approved' ? 'অনুমোদিত' : 'বাতিল'}</span>
          </div>
          <div class="wr-info">${data.points} পয়েন্ট = ৳${data.taka}</div>
          ${data.status === 'pending' ? `
          <div class="wr-actions">
            <button class="btn-approve" onclick="updateWithdraw('${d.id}','approved')">✅ অনুমোদন</button>
            <button class="btn-reject" onclick="updateWithdraw('${d.id}','rejected')">❌ বাতিল</button>
          </div>` : ''}
        `;
        container.appendChild(el);
      });
    }

    async function loadUsers() {
      const container = document.getElementById('usersList');
      container.innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
      const snap = await getDocs(collection(db, 'users'));
      if (snap.empty) { container.innerHTML = '<div class="empty-state">কোনো ইউজার নেই</div>'; return; }
      container.innerHTML = '';
      snap.forEach(d => {
        const data = d.data();
        const el = document.createElement('div');
        el.className = 'user-item';
        el.innerHTML = `
          <div class="user-info">
            <div class="u-name">${data.name || 'অজানা'} ${data.isAdmin ? '👑' : ''}</div>
            <div class="u-email">${data.email || ''}</div>
          </div>
          <div class="user-points">${data.points || 0}</div>
        `;
        container.appendChild(el);
      });
    }

    window.updateWithdraw = async (id, status) => {
      await updateDoc(doc(db, 'withdrawRequests', id), { status });
      showToast(status === 'approved' ? '✅ অনুমোদন করা হয়েছে' : '❌ বাতিল করা হয়েছে');
      loadWithdrawRequests();
      loadStats();
    };

    window.saveAdSettings = async () => {
      const data = {
        spinPoints: parseInt(document.getElementById('spinPoints').value) || 10,
        quizPoints: parseInt(document.getElementById('quizPoints').value) || 15,
        scratchPoints: parseInt(document.getElementById('scratchPoints').value) || 20,
      };
      await setDoc(doc(db, 'settings', 'adConfig'), data, { merge: true });
      showToast('✅ পয়েন্ট সেটিংস সেভ হয়েছে!');
    };

    window.saveRateSettings = async () => {
      const data = {
        pointsToTaka: parseFloat(document.getElementById('pointsToTaka').value) || 0.01,
        minWithdraw: parseInt(document.getElementById('minWithdraw').value) || 100,
      };
      await setDoc(doc(db, 'settings', 'adConfig'), data, { merge: true });
      showToast('✅ রেট সেটিংস সেভ হয়েছে!');
    };

    window.makeAdmin = async () => {
      const uid = document.getElementById('adminEmail').value.trim();
      if (!uid) { showToast('UID দিন!', true); return; }
      await updateDoc(doc(db, 'users', uid), { isAdmin: true });
      showToast('✅ অ্যাডমিন করা হয়েছে!');
    };

    window.doLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#ef4444' : '#10b981';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
