<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnZone — Login</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --accent: #f59e0b;
      --accent2: #ef4444;
      --green: #10b981;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(245,158,11,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Bengali', 'Sora', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 20px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(245,158,11,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(239,68,68,0.06) 0%, transparent 50%);
      pointer-events: none;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0%{opacity:.5} 100%{opacity:1} }

    /* ── Splash (auth চেক করার সময়) ── */
    #splashScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 999;
    }
    .splash-icon {
      font-size: 64px;
      animation: splashBounce 1s ease-in-out infinite alternate;
    }
    @keyframes splashBounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
    .splash-title {
      font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #fcd34d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .splash-sub { font-size: 13px; color: var(--muted); }
    .splash-bar-wrap {
      width: 200px; height: 5px;
      background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden;
    }
    .splash-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      animation: splashLoad 1.5s ease-in-out forwards;
    }
    @keyframes splashLoad { from{width:0%} to{width:85%} }

    /* ── Login Card ── */
    #loginCard { display: none; width: 100%; max-width: 380px; position: relative; z-index: 1; }

    .logo-wrap { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px; display: flex; align-items: center;
      justify-content: center; font-size: 36px;
      margin: 0 auto 12px;
      box-shadow: 0 0 40px rgba(245,158,11,0.3);
    }
    .logo-title {
      font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #fcd34d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px 24px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .tabs {
      display: flex; background: rgba(255,255,255,0.05);
      border-radius: 12px; padding: 4px; margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 10px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      color: var(--muted); transition: all .3s;
    }
    .tab.active { background: linear-gradient(135deg, var(--accent), #f97316); color: #000; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .form-group input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 13px 16px; color: var(--text); font-size: 15px;
      font-family: inherit; outline: none; transition: border-color .3s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap input { width: 100%; padding-right: 46px; }
    .eye-btn {
      position: absolute; right: 14px; font-size: 18px;
      cursor: pointer; user-select: none; opacity: .6; transition: opacity .2s;
    }
    .eye-btn:hover { opacity: 1; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), #f97316);
      border: none; border-radius: 14px; color: #000;
      font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 20px rgba(245,158,11,0.3);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,158,11,0.4); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-top: 12px; display: none;
    }
    .success-msg {
      background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-top: 12px; display: none;
    }

    .loading {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>

  <!-- ══ Splash Screen (auth চেক করার সময় দেখায়) ══ -->
  <div id="splashScreen">
    <div class="splash-icon">💰</div>
    <div class="splash-title">EarnZone</div>
    <div class="splash-sub">লোড হচ্ছে...</div>
    <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
  </div>

  <!-- ══ Login / Signup Card (auth চেক শেষে দেখায়) ══ -->
  <div id="loginCard">
    <div class="logo-wrap">
      <div class="logo-icon">💰</div>
      <div class="logo-title">EarnZone</div>
      <div class="logo-sub">দেখুন, খেলুন, আয় করুন!</div>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">লগইন</div>
        <div class="tab" onclick="switchTab('signup')">সাইনআপ</div>
      </div>

      <!-- Login -->
      <div class="form-panel active" id="loginPanel">
        <div class="form-group">
          <label>ইমেইল</label>
          <input type="email" id="loginEmail" placeholder="আপনার ইমেইল দিন">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <div class="input-wrap">
            <input type="password" id="loginPass" placeholder="পাসওয়ার্ড দিন">
            <span class="eye-btn" onclick="togglePass('loginPass',this)">👁️</span>
          </div>
        </div>
        <button class="btn-primary" onclick="doLogin()" id="loginBtn">লগইন করুন</button>
        <div class="error-msg" id="loginError"></div>
      </div>

      <!-- Signup -->
      <div class="form-panel" id="signupPanel">
        <div class="form-group">
          <label>নাম</label>
          <input type="text" id="signupName" placeholder="আপনার নাম দিন">
        </div>
        <div class="form-group">
          <label>ইমেইল</label>
          <input type="email" id="signupEmail" placeholder="আপনার ইমেইল দিন">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <div class="input-wrap">
            <input type="password" id="signupPass" placeholder="পাসওয়ার্ড দিন (৬+ অক্ষর)">
            <span class="eye-btn" onclick="togglePass('signupPass',this)">👁️</span>
          </div>
        </div>
        <button class="btn-primary" onclick="doSignup()" id="signupBtn">অ্যাকাউন্ট খুলুন</button>
        <div class="error-msg" id="signupError"></div>
        <div class="success-msg" id="signupSuccess"></div>
      </div>
    </div>
  </div>

  <!-- Non-module helpers -->
  <script>
    window.togglePass = (id, btn) => {
      const el = document.getElementById(id);
      el.type   = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    };
    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup'));
      });
      document.getElementById('loginPanel').classList.toggle('active',  tab==='login');
      document.getElementById('signupPanel').classList.toggle('active', tab==='signup');
    };
  </script>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import {
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      doc, setDoc, getDoc, updateDoc,
      query, collection, where, getDocs, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    /* ── Device Fingerprint ── */
    function getDeviceId() {
      let id = localStorage.getItem('_did');
      if (!id) {
        const raw = [
          navigator.userAgent, navigator.language,
          screen.width+'x'+screen.height,
          new Date().getTimezoneOffset(),
          navigator.hardwareConcurrency||0,
          navigator.platform||''
        ].join('|');
        let hash = 0;
        for (let i=0; i<raw.length; i++) { hash=((hash<<5)-hash)+raw.charCodeAt(i); hash|=0; }
        id = Math.abs(hash).toString(36) + '-' + Date.now().toString(36);
        localStorage.setItem('_did', id);
      }
      return id;
    }
    const DEVICE_ID = getDeviceId();

    /* ════════════════════════════════════════
       AUTH STATE CHECK
       ✅ লগইন থাকলে → home.html
       ✅ লগইন না থাকলে → login form দেখাও
       এই check টাই spinner দেখানোর কারণ।
    ════════════════════════════════════════ */
    let _authChecked = false;

    onAuthStateChanged(auth, async (user) => {
      if (_authChecked) return; // একবারের বেশি চলবে না
      _authChecked = true;

      if (user) {
        /* ── লগইন আছে → ডিভাইস যাচাই → home.html ── */
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (!snap.exists()) {
            /* Firestore record নেই → logout করো */
            await signOut(auth);
            showLoginForm();
            return;
          }
          const data = snap.data();

          /* ডিভাইস mismatch চেক */
          if (data.deviceId && data.deviceId !== DEVICE_ID) {
            await signOut(auth);
            localStorage.removeItem('_did');
            showError('loginError', '🚫 এই অ্যাকাউন্ট অন্য ডিভাইসে নিবন্ধিত!');
            showLoginForm();
            return;
          }

          /* সব ঠিক আছে → home এ যাও */
          window.location.replace('home.html');
        } catch (e) {
          /* Firestore error → login form দেখাও */
          showLoginForm();
        }
      } else {
        /* ── লগইন নেই → login form দেখাও ── */
        showLoginForm();
      }
    });

    function showLoginForm() {
      document.getElementById('splashScreen').style.display = 'none';
      document.getElementById('loginCard').style.display    = 'block';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.innerHTML = msg; el.style.display = 'block';
    }
    function hideError(id) {
      document.getElementById(id).style.display = 'none';
    }

    /* ════════════════════════════════════════
       LOGIN
    ════════════════════════════════════════ */
    window.doLogin = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPass').value;
      const btn   = document.getElementById('loginBtn');
      hideError('loginError');

      if (!email || !pass) { showError('loginError','সব তথ্য দিন'); return; }

      btn.innerHTML = '<span class="loading"></span>লগইন হচ্ছে...';
      btn.disabled  = true;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        const snap = await getDoc(doc(db,'users',cred.user.uid));

        if (!snap.exists()) {
          await signOut(auth);
          showError('loginError','অ্যাকাউন্ট পাওয়া যায়নি!');
          btn.innerHTML='লগইন করুন'; btn.disabled=false; return;
        }

        const data = snap.data();

        /* ডিভাইস চেক */
        if (data.deviceId && data.deviceId !== DEVICE_ID) {
          await signOut(auth);
          showError('loginError','🚫 এই অ্যাকাউন্ট অন্য ডিভাইসে নিবন্ধিত!<br><small>একটি অ্যাকাউন্ট শুধু একটি ডিভাইসে ব্যবহার করা যাবে।</small>');
          btn.innerHTML='লগইন করুন'; btn.disabled=false; return;
        }

        /* ডিভাইস আপডেট */
        await updateDoc(doc(db,'users',cred.user.uid),{
          deviceId: DEVICE_ID, lastLogin: serverTimestamp()
        });

        /* ─ onAuthStateChanged আবার fire হবে → home.html redirect হবে ─ */

      } catch (e) {
        const msg = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
          ? 'ইমেইল বা পাসওয়ার্ড ভুল!'
          : 'লগইন ব্যর্থ হয়েছে!';
        showError('loginError', msg);
        btn.innerHTML='লগইন করুন'; btn.disabled=false;
      }
    };

    /* ════════════════════════════════════════
       SIGNUP
    ════════════════════════════════════════ */
    window.doSignup = async () => {
      const name  = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass  = document.getElementById('signupPass').value;
      const btn   = document.getElementById('signupBtn');
      hideError('signupError');
      document.getElementById('signupSuccess').style.display='none';

      if (!name||!email||!pass) { showError('signupError','সব তথ্য দিন'); return; }
      if (pass.length < 6)     { showError('signupError','পাসওয়ার্ড কমপক্ষে ৬ অক্ষর'); return; }

      btn.innerHTML='<span class="loading"></span>তৈরি হচ্ছে...';
      btn.disabled=true;

      try {
        /* এই ডিভাইসে আগেই অ্যাকাউন্ট আছে কিনা */
        const dq   = query(collection(db,'users'), where('deviceId','==',DEVICE_ID));
        const dSnap= await getDocs(dq);
        if (!dSnap.empty) {
          showError('signupError','🚫 এই ডিভাইসে আগেই একটি অ্যাকাউন্ট তৈরি হয়েছে!');
          btn.innerHTML='অ্যাকাউন্ট খুলুন'; btn.disabled=false; return;
        }

        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db,'users',cred.user.uid),{
          name, email, points:0, balance:0, adCount:0,
          isAdmin: false, deviceId: DEVICE_ID,
          createdAt: serverTimestamp(), lastLogin: serverTimestamp()
        });

        const sEl = document.getElementById('signupSuccess');
        sEl.textContent='✅ অ্যাকাউন্ট তৈরি হয়েছে! হোমে যাচ্ছি...';
        sEl.style.display='block';
        /* onAuthStateChanged fire → home.html */

      } catch (e) {
        const msg = e.code==='auth/email-already-in-use'
          ? 'এই ইমেইল আগেই ব্যবহৃত!'
          : 'সাইনআপ ব্যর্থ হয়েছে';
        showError('signupError', msg);
        btn.innerHTML='অ্যাকাউন্ট খুলুন'; btn.disabled=false;
      }
    };
  </script>
</body>
</html>
