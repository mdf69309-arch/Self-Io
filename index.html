<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnZone — Login</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0e1a;--card:#111827;
      --accent:#f59e0b;--accent2:#ef4444;
      --green:#10b981;--text:#f1f5f9;
      --muted:#64748b;--border:rgba(245,158,11,0.2);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Noto Sans Bengali','Sora',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:20px;position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
      background:
        radial-gradient(ellipse at 30% 20%,rgba(245,158,11,0.08) 0%,transparent 50%),
        radial-gradient(ellipse at 70% 80%,rgba(239,68,68,0.06) 0%,transparent 50%);
      pointer-events:none;animation:bgP 8s ease-in-out infinite alternate;
    }
    @keyframes bgP{0%{opacity:.5}100%{opacity:1}}

    /* Splash */
    #splashScreen{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;z-index:999;
    }
    .si{font-size:64px;animation:sb 1s ease-in-out infinite alternate;}
    @keyframes sb{from{transform:translateY(0)}to{transform:translateY(-12px)}}
    .st{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .ss{font-size:13px;color:var(--muted);}
    .sbw{width:200px;height:5px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
    .sb{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;animation:sl 1.5s ease forwards;}
    @keyframes sl{from{width:0%}to{width:85%}}

    /* Main */
    #mainCard{display:none;width:100%;max-width:380px;position:relative;z-index:1;}
    .logo-wrap{text-align:center;margin-bottom:24px;}
    .logo-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 10px;box-shadow:0 0 40px rgba(245,158,11,0.3);}
    .logo-title{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-sub{font-size:13px;color:var(--muted);margin-top:3px;}

    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:26px 22px;animation:fu .5s ease both;}
    @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:22px;}
    .tab{flex:1;padding:9px;text-align:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:all .3s;}
    .tab.active{background:linear-gradient(135deg,var(--accent),#f97316);color:#000;}
    .form-panel{display:none;} .form-panel.active{display:block;}

    .fg{margin-bottom:14px;}
    .fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:700;}
    .fg input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .3s;}
    .fg input:focus{border-color:var(--accent);}
    .pw-wrap{position:relative;}
    .pw-wrap input{padding-right:46px;}
    .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;cursor:pointer;opacity:.6;}

    .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#f97316);border:none;border-radius:13px;color:#000;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;box-shadow:0 4px 20px rgba(245,158,11,0.3);transition:transform .2s;}
    .btn-primary:active{transform:scale(0.98);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .reset-link{text-align:center;margin-top:12px;font-size:12px;color:var(--muted);}
    .reset-link span{color:var(--accent);cursor:pointer;font-weight:700;text-decoration:underline;}

    /* Helpline */
    .helpline-wrap{margin-top:20px;text-align:center;}
    .helpline-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
    .helpline-row{display:flex;justify-content:center;gap:12px;}
    .hl-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;padding:10px 14px;border-radius:14px;border:1px solid transparent;transition:all .2s;}
    .hl-btn:active{transform:scale(0.93);}
    .hl-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .hl-label{font-size:11px;font-weight:700;color:var(--text);}
    .hl-tg{background:rgba(41,182,246,0.08);border-color:rgba(41,182,246,0.2);}
    .hl-tg .hl-icon{background:rgba(41,182,246,0.15);}
    .hl-wa{background:rgba(37,211,102,0.08);border-color:rgba(37,211,102,0.2);}
    .hl-wa .hl-icon{background:rgba(37,211,102,0.15);}
    .hl-call{background:rgba(232,56,13,0.08);border-color:rgba(232,56,13,0.2);}
    .hl-call .hl-icon{background:rgba(232,56,13,0.15);}

    .err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;padding:9px 13px;border-radius:10px;font-size:12px;margin-top:10px;display:none;line-height:1.6;}
    .suc{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7;padding:9px 13px;border-radius:10px;font-size:12px;margin-top:10px;display:none;line-height:1.6;}
    .inf{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:#fcd34d;padding:9px 13px;border-radius:10px;font-size:12px;margin-top:10px;display:none;line-height:1.6;}

    .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:sr .6s linear infinite;vertical-align:middle;margin-right:5px;}
    @keyframes sr{to{transform:rotate(360deg)}}

    /* Reset Overlay */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;align-items:center;justify-content:center;padding:20px;}
    .overlay.on{display:flex;}
    .ovbox{background:#111827;border:1px solid var(--border);border-radius:22px;padding:24px 20px;width:100%;max-width:360px;}
    .ov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .ov-title{font-size:17px;font-weight:800;}
    .ov-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
    .ov-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6;}
    .step{display:none;} .step.active{display:block;}
    .step-lbl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;}
    .step-num{width:20px;height:20px;border-radius:50%;background:rgba(245,158,11,0.2);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
  </style>
</head>
<body>

<!-- Splash -->
<div id="splashScreen">
  <div class="si">💰</div>
  <div class="st">EarnZone</div>
  <div class="ss">লোড হচ্ছে...</div>
  <div class="sbw"><div class="sb"></div></div>
</div>

<!-- Main Card -->
<div id="mainCard">
  <div class="logo-wrap">
    <div class="logo-icon">💰</div>
    <div class="logo-title">EarnZone</div>
    <div class="logo-sub">দেখুন, খেলুন, আয় করুন!</div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">লগইন</div>
      <div class="tab"        onclick="switchTab('signup')">সাইনআপ</div>
    </div>

    <!-- Login -->
    <div class="form-panel active" id="loginPanel">
      <div class="fg"><label>ইমেইল</label><input type="email" id="loginEmail" placeholder="আপনার ইমেইল দিন"></div>
      <div class="fg">
        <label>পাসওয়ার্ড</label>
        <div class="pw-wrap">
          <input type="password" id="loginPass" placeholder="পাসওয়ার্ড দিন">
          <span class="eye" onclick="togglePw('loginPass',this)">👁️</span>
        </div>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">লগইন করুন</button>
      <div class="reset-link">পাসওয়ার্ড ভুলে গেছেন? <span onclick="openReset()">রিসেট করুন</span></div>
      <div class="err" id="loginErr"></div>
      <div class="inf" id="loginInfo"></div>
    </div>

    <!-- Signup -->
    <div class="form-panel" id="signupPanel">
      <div class="fg"><label>নাম</label><input type="text" id="signupName" placeholder="আপনার নাম দিন"></div>
      <div class="fg"><label>ইমেইল</label><input type="email" id="signupEmail" placeholder="আপনার ইমেইল দিন"></div>
      <div class="fg">
        <label>পাসওয়ার্ড</label>
        <div class="pw-wrap">
          <input type="password" id="signupPass" placeholder="পাসওয়ার্ড (৬+ অক্ষর)">
          <span class="eye" onclick="togglePw('signupPass',this)">👁️</span>
        </div>
      </div>
      <button class="btn-primary" id="signupBtn" onclick="doSignup()">অ্যাকাউন্ট খুলুন</button>
      <div class="err" id="signupErr"></div>
      <div class="suc" id="signupSuc"></div>
    </div>
  </div>
  <!-- Helpline -->
  <div class="helpline-wrap">
    <div class="helpline-label">হেল্পলাইন</div>
    <div class="helpline-row">
      <a class="hl-btn hl-tg"   href="#" onclick="openHelplink('tg',event)">
        <div class="hl-icon">✈️</div><span class="hl-label">Telegram</span>
      </a>
      <a class="hl-btn hl-wa"   href="#" onclick="openHelplink('wa',event)">
        <div class="hl-icon">💬</div><span class="hl-label">WhatsApp</span>
      </a>
      <a class="hl-btn hl-call" href="#" onclick="openHelplink('call',event)">
        <div class="hl-icon">📞</div><span class="hl-label">Call</span>
      </a>
    </div>
  </div>
</div>

<!-- Password Reset Overlay -->
<div class="overlay" id="resetOverlay">
  <div class="ovbox">
    <div class="ov-head">
      <div class="ov-title">🔑 পাসওয়ার্ড রিসেট</div>
      <button class="ov-close" onclick="closeReset()">✕</button>
    </div>
    <div class="ov-sub" id="ovSub">নিবন্ধিত ইমেইল দিন। ডিভাইস যাচাই হলে রিসেট ইমেইল পাঠানো হবে।</div>

    <!-- Step 1: Email -->
    <div class="step active" id="rstep1">
      <div class="step-lbl"><div class="step-num">1</div>ইমেইল যাচাই</div>
      <div class="fg"><input type="email" id="resetEmail" placeholder="আপনার ইমেইল দিন"></div>
      <button class="btn-primary" id="rstep1Btn" onclick="verifyResetEmail()">পরবর্তী ›</button>
      <div class="err" id="rErr1"></div>
    </div>

    <!-- Step 2: Confirm -->
    <div class="step" id="rstep2">
      <div class="step-lbl"><div class="step-num">2</div>রিসেট ইমেইল</div>
      <div class="suc" id="rSuc2" style="display:block;"></div>
    </div>
  </div>
</div>

<script>
window.togglePw=(id,btn)=>{ const e=document.getElementById(id); e.type=e.type==='password'?'text':'password'; btn.textContent=e.type==='password'?'👁️':'🙈'; };
window.switchTab=(tab)=>{
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginPanel').classList.toggle('active',tab==='login');
  document.getElementById('signupPanel').classList.toggle('active',tab==='signup');
};
window.openReset=()=>{ document.getElementById('resetOverlay').classList.add('on'); };

/* Helpline — Firestore থেকে লিংক লোড */
window._hlLinks={tg:'',wa:'',call:''};
window.openHelplink=(type,e)=>{
  e.preventDefault();
  const links=window._hlLinks||{};
  let url=(type==='tg'?links.tg:type==='wa'?links.wa:links.call)||'';
  if(!url){
    typeof showToast==='function'
      ?showToast('লিংক এখনো সেট হয়নি!',true)
      :alert('লিংক এখনো সেট হয়নি!');
    return;
  }

  const tgApp=window.Telegram&&window.Telegram.WebApp;

  /* ── Call ── */
  if(type==='call'){
    const num=url.replace(/[^0-9+]/g,'');
    if(tgApp) tgApp.openLink('tel:'+num);
    else window.location.href='tel:'+num;
    return;
  }

  /* ── Telegram: openTelegramLink ব্যবহার করো ── */
  if(type==='tg'){
    // যেকোনো format → https://t.me/username
    if(url.startsWith('tg:')){
      const m=url.match(/domain=([^&]+)/);
      url=m?'https://t.me/'+m[1]:'https://t.me/';
    } else if(url.startsWith('@')){
      url='https://t.me/'+url.slice(1);
    } else if(url.startsWith('t.me/')){
      url='https://'+url;
    } else if(!url.startsWith('http')){
      url='https://t.me/'+url;
    }
    if(tgApp && typeof tgApp.openTelegramLink==='function'){
      tgApp.openTelegramLink(url);
    } else {
      window.open(url,'_blank');
    }
    return;
  }

  /* ── WhatsApp ── */
  if(type==='wa'){
    if(!url.startsWith('http')){
      url='https://wa.me/'+url.replace(/[^0-9]/g,'');
    }
    if(tgApp && typeof tgApp.openLink==='function'){
      tgApp.openLink(url);
    } else {
      window.open(url,'_blank');
    }
    return;
  }
};
  let url=(type==='tg'?links.tg:type==='wa'?links.wa:links.call)||'';
  if(!url){
    typeof showToast==='function'?showToast('লিংক এখনো সেট হয়নি!',true):alert('লিংক এখনো সেট হয়নি!');
    return;
  }
  /* ── Call ── */
  if(type==='call'){
    window.location.href='tel:'+url.replace(/[^0-9+]/g,'');
    return;
  }
  /* ── Telegram: যেকোনো format কে https://t.me/ এ convert ── */
  if(type==='tg'){
    // tg:resolve?domain=xxx  বা  @username  বা  t.me/xxx  সব handle করো
    if(url.startsWith('tg:')||url.startsWith('@')){
      const username=url.replace(/^tg:resolve\?domain=/,'').replace(/^@/,'').trim();
      url='https://t.me/'+username;
    } else if(url.startsWith('t.me/')){
      url='https://'+url;
    } else if(!url.startsWith('http')){
      url='https://t.me/'+url;
    }
  }
  /* ── WhatsApp: wa.me format নিশ্চিত করো ── */
  if(type==='wa'){
    if(url.startsWith('whatsapp://')||url.startsWith('+88')||(/^\d/.test(url))){
      url='https://wa.me/'+url.replace(/[^0-9]/g,'');
    } else if(!url.startsWith('http')){
      url='https://wa.me/'+url.replace(/[^0-9]/g,'');
    }
  }
  /* ── Telegram WebApp openLink ব্যবহার করো ── */
  const tgApp=window.Telegram&&window.Telegram.WebApp;
  if(tgApp && typeof tgApp.openLink==='function'){
    tgApp.openLink(url);
  } else {
    window.open(url,'_blank');
  }
};
window.closeReset=()=>{
  document.getElementById('resetOverlay').classList.remove('on');
  document.getElementById('rstep1').classList.add('active');
  document.getElementById('rstep2').classList.remove('active');
  document.getElementById('resetEmail').value='';
  ['rErr1'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; });
};
function showMsg(id,msg,type='err'){
  const e=document.getElementById(id);
  e.innerHTML=msg; e.className=type; e.style.display='block';
}
function hideMsg(id){ const e=document.getElementById(id); if(e) e.style.display='none'; }
</script>

<script type="module">
import { auth, db } from './firebase-config.js';
import {
  onAuthStateChanged, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut,
  sendPasswordResetEmail
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import {
  doc, setDoc, getDoc, updateDoc, addDoc,
  query, collection, where, getDocs,
  serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

/* ── Device ID ── */
function getDeviceId(){
  let id=localStorage.getItem('_did');
  if(!id){
    const raw=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,
      new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.platform||''].join('|');
    let h=0; for(let i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0;}
    id=Math.abs(h).toString(36)+'-'+Date.now().toString(36);
    localStorage.setItem('_did',id);
  }
  return id;
}
const DEVICE_ID=getDeviceId();

/* Helpline লিংক Firestore থেকে লোড করো */
(async()=>{
  try{
    const {getDoc,doc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const snap=await getDoc(doc(db,'settings','helpline'));
    if(snap.exists()){
      const d=snap.data();
      window._hlLinks={tg:d.telegram||'',wa:d.whatsapp||'',call:d.call||''};
    }
  }catch(e){}
})();

/* ── Splash → auth check ──
   শুধু পেজ লোডের সময় চলে।
   লগইন/সাইনআপের পরে redirect
   doLogin/doSignup নিজেই করে।
── */
let _splashDone=false;
onAuthStateChanged(auth,async(user)=>{
  if(_splashDone) return; // শুধু প্রথমবার চলবে
  _splashDone=true;
  if(user){
    try{
      const snap=await getDoc(doc(db,'users',user.uid));
      if(!snap.exists()){ await signOut(auth); showForm(); return; }
      const d=snap.data();
      if(d.deviceId&&d.deviceId!==DEVICE_ID){ await signOut(auth); showForm(); return; }
      window.location.replace('home.html');
    }catch{ showForm(); }
  } else { showForm(); }
});

function showForm(){
  document.getElementById('splashScreen').style.display='none';
  document.getElementById('mainCard').style.display='block';
}

/* লগইন/সাইনআপ সফলের পর redirect */
function goHome(){
  window.location.href='home.html';
}

/* ════════════════════════════════
   LOGIN
════════════════════════════════ */
window.doLogin=async()=>{
  const email=document.getElementById('loginEmail').value.trim();
  const pass =document.getElementById('loginPass').value;
  const btn  =document.getElementById('loginBtn');
  hideMsg('loginErr'); hideMsg('loginInfo');
  if(!email||!pass){ showMsg('loginErr','সব তথ্য দিন'); return; }
  btn.innerHTML='<span class="spin"></span>লগইন হচ্ছে...'; btn.disabled=true;

  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    const snap=await getDoc(doc(db,'users',cred.user.uid));
    if(!snap.exists()){ await signOut(auth); showMsg('loginErr','অ্যাকাউন্ট পাওয়া যায়নি!'); btn.innerHTML='লগইন করুন'; btn.disabled=false; return; }
    const data=snap.data();

    /* ── ব্যান চেক ── */
    if(data.banned){
      await signOut(auth);
      showMsg('loginErr','🚫 আপনার অ্যাকাউন্ট ব্যান করা হয়েছে!');
      btn.innerHTML='লগইন করুন'; btn.disabled=false; return;
    }

    /* ── Device চেক ── */
    if(data.deviceId && data.deviceId!==DEVICE_ID){
      await signOut(auth);

      /* ── নতুন ডিভাইস রিকোয়েস্ট Firestore এ সেভ করো ── */
      await saveDeviceRequest(cred.user.uid, data.name||'অজানা', email, data.deviceId);

      showMsg('loginErr',
        '🚫 এই অ্যাকাউন্ট অন্য ডিভাইসে নিবন্ধিত!<br>' +
        '<small>নতুন ডিভাইস হিসেবে রিকোয়েস্ট পাঠানো হয়েছে।<br>' +
        'Admin অনুমোদন করলে এই ডিভাইসে লগইন করতে পারবেন।</small>'
      );
      btn.innerHTML='লগইন করুন'; btn.disabled=false; return;
    }

    /* ── Device সেভ/আপডেট → সরাসরি home.html এ যাও ── */
    await updateDoc(doc(db,'users',cred.user.uid),{
      deviceId:DEVICE_ID, lastLogin:serverTimestamp()
    });
    goHome();

  }catch(e){
    const msg=
      e.code==='auth/wrong-password'||
      e.code==='auth/user-not-found'||
      e.code==='auth/invalid-credential'
        ? 'ইমেইল বা পাসওয়ার্ড ভুল!'
        : 'লগইন ব্যর্থ হয়েছে!';
    showMsg('loginErr',msg);
    btn.innerHTML='লগইন করুন'; btn.disabled=false;
  }
};

/* নতুন ডিভাইস রিকোয়েস্ট সেভ */
async function saveDeviceRequest(userId, userName, email, oldDeviceId){
  try{
    /* একই pending রিকোয়েস্ট আগে থেকে আছে কিনা চেক */
    const q=query(
      collection(db,'loginRequests'),
      where('userId','==',userId),
      where('status','==','pending')
    );
    const existing=await getDocs(q);
    if(!existing.empty){
      /* আগের রিকোয়েস্ট আছে — শুধু newDeviceId আপডেট করো */
      await updateDoc(doc(db,'loginRequests',existing.docs[0].id),{
        newDeviceId: DEVICE_ID,
        requestedAt: serverTimestamp()
      });
      return;
    }
    /* নতুন রিকোয়েস্ট তৈরি করো */
    await addDoc(collection(db,'loginRequests'),{
      userId,
      userName,
      email,
      oldDeviceId,
      newDeviceId: DEVICE_ID,
      status:      'pending',
      requestedAt: serverTimestamp()
    });
  }catch(e){ console.error('saveDeviceRequest:',e); }
}

/* ════════════════════════════════
   SIGNUP
════════════════════════════════ */
window.doSignup=async()=>{
  const name =document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass =document.getElementById('signupPass').value;
  const btn  =document.getElementById('signupBtn');
  hideMsg('signupErr'); hideMsg('signupSuc');
  if(!name||!email||!pass){ showMsg('signupErr','সব তথ্য দিন'); return; }
  if(pass.length<6){ showMsg('signupErr','পাসওয়ার্ড কমপক্ষে ৬ অক্ষর'); return; }
  btn.innerHTML='<span class="spin"></span>তৈরি হচ্ছে...'; btn.disabled=true;
  try{
    const dq=query(collection(db,'users'),where('deviceId','==',DEVICE_ID));
    const dSnap=await getDocs(dq);
    if(!dSnap.empty){ showMsg('signupErr','🚫 এই ডিভাইসে আগেই একটি অ্যাকাউন্ট আছে!'); btn.innerHTML='অ্যাকাউন্ট খুলুন'; btn.disabled=false; return; }
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{
      name,email,points:0,balance:0,adCount:0,spinCount:0,
      isAdmin:false,deviceId:DEVICE_ID,
      createdAt:serverTimestamp(),lastLogin:serverTimestamp()
    });
    const s=document.getElementById('signupSuc');
    s.textContent='✅ অ্যাকাউন্ট তৈরি হয়েছে! হোমে যাচ্ছি...'; s.style.display='block';
    setTimeout(()=>goHome(), 1200);
  }catch(e){
    showMsg('signupErr',e.code==='auth/email-already-in-use'?'এই ইমেইল আগেই ব্যবহৃত!':'সাইনআপ ব্যর্থ হয়েছে');
    btn.innerHTML='অ্যাকাউন্ট খুলুন'; btn.disabled=false;
  }
};

/* ════════════════════════════════
   PASSWORD RESET
   Device ID যাচাই → Firebase reset email
════════════════════════════════ */
window.verifyResetEmail=async()=>{
  const email=document.getElementById('resetEmail').value.trim();
  const btn  =document.getElementById('rstep1Btn');
  hideMsg('rErr1');
  if(!email){ showMsg('rErr1','ইমেইল দিন!'); return; }
  btn.innerHTML='<span class="spin"></span>যাচাই হচ্ছে...'; btn.disabled=true;

  try{
    const q   =query(collection(db,'users'),where('email','==',email));
    const snap=await getDocs(q);
    if(snap.empty){ showMsg('rErr1','এই ইমেইলে কোনো অ্যাকাউন্ট নেই!'); btn.innerHTML='পরবর্তী ›'; btn.disabled=false; return; }

    const data=snap.docs[0].data();

    /* Device check */
    if(data.deviceId && data.deviceId!==DEVICE_ID){
      showMsg('rErr1','🚫 এই অ্যাকাউন্ট অন্য ডিভাইসে নিবন্ধিত!<br><small>শুধু নিবন্ধিত ডিভাইস থেকে পাসওয়ার্ড রিসেট করা যাবে।</small>');
      btn.innerHTML='পরবর্তী ›'; btn.disabled=false; return;
    }

    /* Send reset email */
    await sendPasswordResetEmail(auth,email);

    document.getElementById('rstep1').classList.remove('active');
    document.getElementById('rstep2').classList.add('active');
    document.getElementById('ovSub').textContent='';
    document.getElementById('rSuc2').innerHTML=
      '✅ রিসেট ইমেইল পাঠানো হয়েছে!<br>' +
      '<small>'+email+' চেক করুন এবং লিংকে ক্লিক করে নতুন পাসওয়ার্ড সেট করুন।</small>';

  }catch(e){
    showMsg('rErr1','ব্যর্থ হয়েছে! আবার চেষ্টা করুন।');
  }
  btn.innerHTML='পরবর্তী ›'; btn.disabled=false;
};
</script>
