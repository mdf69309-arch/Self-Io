<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Leaderboard — EarnZone</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080c14;
      --bg2:     #0f1520;
      --card:    #131c2e;
      --card2:   #1a2540;
      --gold:    #f5c518;
      --gold2:   #ffdf6c;
      --silver:  #c0c9d8;
      --bronze:  #e8946a;
      --accent:  #e8380d;
      --green:   #10b981;
      --text:    #f0f4ff;
      --muted:   #5a6880;
      --border:  rgba(245,197,24,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
      overflow-x: hidden;
    }

    /* ── Background star effect ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(245,197,24,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(232,56,13,0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: var(--text);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .back-btn:active { background: rgba(255,255,255,0.12); }
    .header-title {
      font-family: 'Sora', sans-serif;
      font-size: 20px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Hero Podium ── */
    .hero {
      position: relative; z-index: 1;
      padding: 28px 16px 0;
      text-align: center;
    }
    .hero-label {
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 20px;
    }

    .podium {
      display: flex; align-items: flex-end;
      justify-content: center; gap: 10px;
      margin-bottom: 0;
    }

    /* Podium item */
    .p-item {
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }

    /* Avatar circle */
    .p-avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-family: 'Sora', sans-serif;
      position: relative; margin-bottom: 8px;
      flex-shrink: 0;
    }
    .p-avatar::after {
      content: attr(data-rank);
      position: absolute; bottom: -6px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; font-weight: 800;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif;
    }

    /* 1st place */
    .p-item.first .p-avatar {
      width: 76px; height: 76px; font-size: 28px;
      background: linear-gradient(135deg, #f5c518, #ffdf6c);
      color: #1a1200;
      box-shadow: 0 0 0 3px rgba(245,197,24,0.4), 0 8px 32px rgba(245,197,24,0.3);
    }
    .p-item.first .p-avatar::after {
      background: var(--gold); color: #000; font-size: 11px;
    }
    .p-item.first .p-block {
      background: linear-gradient(180deg, rgba(245,197,24,0.2), rgba(245,197,24,0.06));
      border: 1px solid rgba(245,197,24,0.3);
      width: 100px; border-radius: 12px 12px 0 0;
      height: 90px;
    }
    /* Crown for 1st */
    .crown {
      font-size: 22px; margin-bottom: 4px;
      animation: crownFloat 2s ease-in-out infinite alternate;
    }
    @keyframes crownFloat {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-5px) rotate(5deg); }
    }

    /* 2nd place */
    .p-item.second .p-avatar {
      width: 62px; height: 62px; font-size: 22px;
      background: linear-gradient(135deg, #b8c5d6, #dce8f5);
      color: #1a2030;
      box-shadow: 0 0 0 2px rgba(192,201,216,0.4), 0 6px 20px rgba(192,201,216,0.2);
    }
    .p-item.second .p-avatar::after {
      background: var(--silver); color: #000;
    }
    .p-item.second .p-block {
      background: linear-gradient(180deg, rgba(192,201,216,0.15), rgba(192,201,216,0.04));
      border: 1px solid rgba(192,201,216,0.2);
      width: 86px; border-radius: 10px 10px 0 0;
      height: 68px;
    }

    /* 3rd place */
    .p-item.third .p-avatar {
      width: 56px; height: 56px; font-size: 20px;
      background: linear-gradient(135deg, #c97a45, #e8946a);
      color: #2a1000;
      box-shadow: 0 0 0 2px rgba(232,148,106,0.4), 0 6px 20px rgba(232,148,106,0.2);
    }
    .p-item.third .p-avatar::after {
      background: var(--bronze); color: #000;
    }
    .p-item.third .p-block {
      background: linear-gradient(180deg, rgba(232,148,106,0.15), rgba(232,148,106,0.04));
      border: 1px solid rgba(232,148,106,0.2);
      width: 80px; border-radius: 10px 10px 0 0;
      height: 50px;
    }

    .p-name {
      font-size: 12px; font-weight: 700; text-align: center;
      max-width: 88px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 6px;
    }
    .p-amount {
      font-family: 'Sora', sans-serif;
      font-size: 12px; font-weight: 800;
      margin-bottom: 0;
    }
    .p-item.first  .p-amount { color: var(--gold);   font-size: 13px; }
    .p-item.second .p-amount { color: var(--silver); }
    .p-item.third  .p-amount { color: var(--bronze); }

    /* ── Divider strip ── */
    .strip {
      position: relative; z-index: 1;
      height: 2px; margin: 0 16px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .35;
    }

    /* ── List ── */
    .list-wrap {
      position: relative; z-index: 1;
      padding: 16px 16px 0;
      display: flex; flex-direction: column; gap: 8px;
    }

    .list-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 4px 8px;
      font-size: 12px; font-weight: 700;
      color: var(--muted); letter-spacing: .5px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .rank-row {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      animation: rowIn .35s ease both;
      transition: background .2s;
    }
    .rank-row:active { background: var(--card2); }
    @keyframes rowIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* current user highlight */
    .rank-row.me {
      background: rgba(245,197,24,0.07);
      border-color: rgba(245,197,24,0.2);
    }
    .rank-row.me .row-name::after {
      content: ' (আপনি)';
      font-size: 10px; color: var(--gold); font-weight: 700;
    }

    .row-num {
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 800;
      width: 28px; text-align: center;
      color: var(--muted); flex-shrink: 0;
    }
    .row-num.top3 { color: var(--gold); }

    .row-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--card2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      font-weight: 800; font-family: 'Sora', sans-serif;
    }

    .row-info { flex: 1; min-width: 0; }
    .row-name {
      font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-pts {
      font-size: 11px; color: var(--muted); margin-top: 2px;
    }

    .row-amount {
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 800;
      flex-shrink: 0;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: var(--card); border-radius: 14px;
      padding: 12px 14px; display: flex;
      align-items: center; gap: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .sk-circle {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(90deg, var(--card2) 25%, var(--card) 50%, var(--card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite; flex-shrink: 0;
    }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .sk-line {
      height: 10px; border-radius: 6px;
      background: linear-gradient(90deg, var(--card2) 25%, var(--card) 50%, var(--card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    .sk-line.short { width: 55%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 14px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── My rank sticky bar ── */
    .my-rank-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,18,30,0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 100;
    }
    .my-rank-bar.show { display: flex; align-items: center; gap: 12px; }
    .my-rank-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .my-rank-num {
      font-family: 'Sora', sans-serif;
      font-size: 22px; font-weight: 900; color: var(--gold);
    }
    .my-rank-info { flex: 1; }
    .my-rank-name { font-size: 14px; font-weight: 700; }
    .my-rank-amount { font-family: 'Sora', sans-serif; font-size: 13px; color: var(--green); font-weight: 700; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--green); color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 700; opacity: 0;
      transition: all .3s; z-index: 9999;
      white-space: nowrap; pointer-events: none;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" onclick="location.href='home.html'">←</button>
  <div>
    <div class="header-title">🏆 Leaderboard</div>
    <div class="header-sub" id="lastUpdated">লোড হচ্ছে...</div>
  </div>
</div>

<!-- Hero Podium (Top 3) -->
<div class="hero" id="podiumWrap" style="display:none;">
  <div class="hero-label">শীর্ষ বিজয়ীরা</div>
  <div class="podium">

    <!-- 2nd -->
    <div class="p-item second">
      <div class="p-avatar" id="p2avatar" data-rank="2">?</div>
      <div class="p-name" id="p2name">—</div>
      <div class="p-amount" id="p2amount">৳0</div>
      <div class="p-block"></div>
    </div>

    <!-- 1st -->
    <div class="p-item first">
      <div class="crown">👑</div>
      <div class="p-avatar" id="p1avatar" data-rank="1">?</div>
      <div class="p-name" id="p1name">—</div>
      <div class="p-amount" id="p1amount">৳0</div>
      <div class="p-block"></div>
    </div>

    <!-- 3rd -->
    <div class="p-item third">
      <div class="p-avatar" id="p3avatar" data-rank="3">?</div>
      <div class="p-name" id="p3name">—</div>
      <div class="p-amount" id="p3amount">৳0</div>
      <div class="p-block"></div>
    </div>

  </div>
</div>

<div class="strip" style="margin-top:16px;"></div>

<!-- Full List (4th onwards) -->
<div class="list-wrap">
  <div class="list-header">
    <span>র‍্যাংক · নাম</span>
    <span>মোট আয়</span>
  </div>

  <!-- Skeletons while loading -->
  <div id="skeletons">
    <div class="skeleton" style="animation-delay:.05s">
      <div class="sk-circle"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>
    <div class="skeleton" style="animation-delay:.1s">
      <div class="sk-circle"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>
    <div class="skeleton" style="animation-delay:.15s">
      <div class="sk-circle"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>
    <div class="skeleton" style="animation-delay:.2s">
      <div class="sk-circle"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>
    <div class="skeleton" style="animation-delay:.25s">
      <div class="sk-circle"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>
  </div>

  <div id="listContainer"></div>
</div>

<!-- My rank sticky bottom bar -->
<div class="my-rank-bar" id="myRankBar">
  <div class="my-rank-info">
    <div class="my-rank-label">আপনার অবস্থান</div>
    <div class="my-rank-name" id="myRankName">—</div>
    <div class="my-rank-amount" id="myRankAmount">৳0.00</div>
  </div>
  <div class="my-rank-num" id="myRankNum">#—</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import {
  collection, getDocs, query, orderBy, limit
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.expand();
  tg.BackButton.show();
  tg.BackButton.onClick(() => location.href = 'home.html');
}

/* ── Avatar initials helper ── */
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}

/* ── Avatar background colors ── */
const AVATAR_COLORS = [
  'linear-gradient(135deg,#e8380d,#ff6b35)',
  'linear-gradient(135deg,#7c3aed,#9333ea)',
  'linear-gradient(135deg,#0891b2,#06b6d4)',
  'linear-gradient(135deg,#047857,#10b981)',
  'linear-gradient(135deg,#b45309,#f59e0b)',
  'linear-gradient(135deg,#be123c,#f43f5e)',
  'linear-gradient(135deg,#1d4ed8,#3b82f6)',
  'linear-gradient(135deg,#065f46,#34d399)',
];
function avatarColor(idx) {
  return AVATAR_COLORS[idx % AVATAR_COLORS.length];
}

/* ── Format taka ── */
function fmtTaka(val) {
  const n = parseFloat(val) || 0;
  if (n >= 1000) return '৳' + (n/1000).toFixed(1) + 'k';
  return '৳' + n.toFixed(2);
}

/* ── Load leaderboard ── */
onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = 'index.html'; return; }

  try {
    /* সব ইউজার balance অনুযায়ী sort করে আনো */
    const q    = query(collection(db, 'users'), orderBy('balance', 'desc'), limit(100));
    const snap = await getDocs(q);

    const users = [];
    snap.forEach(d => {
      const data = d.data();
      users.push({
        uid:     d.id,
        name:    data.name    || 'অজানা',
        balance: parseFloat(data.balance) || 0,
        points:  parseInt(data.points)    || 0,
        isMe:    d.id === user.uid
      });
    });

    /* Balance এ sort (Firestore orderBy এ হয়েছে, তবুও client-side নিশ্চিত করো) */
    users.sort((a, b) => b.balance - a.balance);

    /* Skeleton সরাও */
    document.getElementById('skeletons').style.display = 'none';

    if (users.length === 0) {
      document.getElementById('listContainer').innerHTML =
        '<div class="empty"><div class="empty-icon">🏅</div>এখনো কোনো ইউজার নেই</div>';
      return;
    }

    /* ── Podium (Top 3) ── */
    const podiumData = [
      { id:'p1', rank:1, item: users[0] },
      { id:'p2', rank:2, item: users[1] },
      { id:'p3', rank:3, item: users[2] },
    ];

    podiumData.forEach(({ id, item }, i) => {
      if (!item) return;
      const avatarEl = document.getElementById(id + 'avatar');
      const nameEl   = document.getElementById(id + 'name');
      const amountEl = document.getElementById(id + 'amount');
      avatarEl.textContent = getInitials(item.name);
      avatarEl.style.background = avatarColor(i);
      nameEl.textContent   = item.name.split(' ')[0]; // প্রথম নাম
      amountEl.textContent = fmtTaka(item.balance);
    });

    if (users.length >= 1) document.getElementById('podiumWrap').style.display = 'block';

    /* ── Full list (সবাই, rank 1 থেকে) ── */
    const container = document.getElementById('listContainer');
    container.innerHTML = '';

    let myRank = -1;

    users.forEach((u, idx) => {
      const rank = idx + 1;
      if (u.isMe) myRank = rank;

      const row = document.createElement('div');
      row.className = 'rank-row' + (u.isMe ? ' me' : '');
      row.style.animationDelay = (idx * 0.04) + 's';

      /* rank badge color */
      let rankColor = 'color:var(--muted)';
      if (rank === 1) rankColor = 'color:var(--gold)';
      if (rank === 2) rankColor = 'color:var(--silver)';
      if (rank === 3) rankColor = 'color:var(--bronze)';

      /* amount color */
      let amtColor = u.balance > 0 ? 'color:#10b981' : 'color:var(--muted)';

      row.innerHTML = `
        <div class="row-num ${rank<=3?'top3':''}" style="${rankColor}">${rank}</div>
        <div class="row-avatar" style="background:${avatarColor(idx)};color:#fff;font-size:16px;font-weight:800;">
          ${getInitials(u.name)}
        </div>
        <div class="row-info">
          <div class="row-name">${u.name}</div>
          <div class="row-pts">⭐ ${u.points} পয়েন্ট</div>
        </div>
        <div class="row-amount" style="${amtColor}">${fmtTaka(u.balance)}</div>
      `;
      container.appendChild(row);
    });

    /* ── My rank sticky bar ── */
    if (myRank !== -1) {
      const me = users[myRank - 1];
      document.getElementById('myRankName').textContent   = me.name;
      document.getElementById('myRankAmount').textContent = '৳' + me.balance.toFixed(2);
      document.getElementById('myRankNum').textContent    = '#' + myRank;
      document.getElementById('myRankBar').classList.add('show');
      /* bottom padding যাতে list ঢাকা না যায় */
      document.body.style.paddingBottom = '80px';
    }

    /* ── Last updated ── */
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'আপডেট: ' + now.toLocaleTimeString('bn-BD', {hour:'2-digit', minute:'2-digit'});

  } catch (e) {
    console.error(e);
    document.getElementById('skeletons').style.display = 'none';
    document.getElementById('listContainer').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>লোড করতে ব্যর্থ হয়েছে</div>';
    showToast('ডেটা লোড হয়নি, আবার চেষ্টা করুন', true);
  }
});

function showToast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? '#ef4444' : '#10b981';
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 3000);
}
</script>
</body>
</html>
